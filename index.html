color:white;

/* BUTTON STYLING */

font-size:18px;

font-weight:600;

// Tracks the last "final" prompt shown so we can save it with an answer
let currentPromptCategory = "";
let currentPromptText = "";
let currentPromptSetAt = 0;
let entryMode = "memory"; // "memory" | "prompt"

function setCurrentPrompt(category, text) {
  currentPromptCategory = category || "";
  currentPromptText = text || "";
  currentPromptSetAt = Date.now();
  refreshReplyPill();
}

function showTab(tab) {
  const isPrompts = tab === "prompts";
  document.getElementById("sectionPrompts").classList.toggle("active", isPrompts);
  document.getElementById("sectionJournal").classList.toggle("active", !isPrompts);

  document.getElementById("tabPrompts").classList.toggle("active", isPrompts);
  document.getElementById("tabJournal").classList.toggle("active", !isPrompts);
}

function setEntryMode(mode) {
  entryMode = mode === "prompt" ? "prompt" : "memory";
  document.getElementById("modeMemory").classList.toggle("active", entryMode === "memory");
  document.getElementById("modePrompt").classList.toggle("active", entryMode === "prompt");
  refreshReplyPill();

  // Slight UX tweak
  const ta = document.getElementById("memoryText");
  ta.placeholder = entryMode === "prompt"
    ? "Write your answer to the prompt..."
    : "Write a thought, memory, or update...";
}

function refreshReplyPill() {
  const pill = document.getElementById("replyPill");
  const textEl = document.getElementById("replyText");

  const show = entryMode === "prompt";
  pill.classList.toggle("show", show);

  if (!show) return;

  if (!currentPromptText) {
    textEl.textContent = "Spin a prompt first.";
    return;
  }

  const cat = currentPromptCategory ? `${currentPromptCategory}: ` : "";
  textEl.textContent = cat + currentPromptText;
}

/* ============================
PROMPT SYSTEM
============================ */

const sheetURL =
  "https://opensheet.elk.sh/18Gxh6zCgx7bWifQCmn_HsxQGkXIMXzp2mKhvikl91OU/Prompts";

let sheetData = [];

async function loadSheet() {
  try {
    const response = await fetch(sheetURL);
    sheetData = await response.json();
    document.getElementById("prompt").innerText = "Tap a button to spin a prompt";
  } catch (err) {
    console.error("Prompt load error:", err);
    document.getElementById("prompt").innerText = "Could not load prompts";
  }
}

loadSheet();

function getHistory(type) {
  const saved = localStorage.getItem("promptHistory_" + type);
  return saved ? JSON.parse(saved) : [];
}

function saveHistory(type, history) {
  localStorage.setItem("promptHistory_" + type, JSON.stringify(history));
}

function spinPrompt(type) {
  if (sheetData.length === 0) {
    document.getElementById("prompt").innerText = "Prompts still loading...";
    return;
  }

  const allPrompts = sheetData
    .map((row) => row[type])
    .filter((p) => p && p.length > 0);

  if (allPrompts.length === 0) {
    document.getElementById("prompt").innerText = "No prompts found for: " + type;
    return;
  }

  let history = getHistory(type);
  if (history.length >= allPrompts.length) history = [];

  const availablePrompts = allPrompts.filter((p) => !history.includes(p));

  const promptElement = document.getElementById("prompt");
  let spins = 16;
  let speed = 60;

  function step() {
    const pool = availablePrompts.length ? availablePrompts : allPrompts;
    const randomPrompt = pool[Math.floor(Math.random() * pool.length)];

    promptElement.style.opacity = 0;
    setTimeout(() => {
      promptElement.innerText = randomPrompt;
      promptElement.style.opacity = 1;
    }, 60);

    spins--;
    speed += 8;

    if (spins <= 0) {
      const finalPool = availablePrompts.length ? availablePrompts : allPrompts;
      const finalPrompt = finalPool[Math.floor(Math.random() * finalPool.length)];
      promptElement.innerText = finalPrompt;
      setCurrentPrompt(type, finalPrompt);
      // Jump to journal composer for quick answering
      setEntryMode("prompt");
      showTab("journal");

      history.push(finalPrompt);
      saveHistory(type, history);

      if (navigator.vibrate) navigator.vibrate(40);
      return;
    }

    setTimeout(step, speed);
  }

  step();
}

/* ============================
AUTH UI

function setAuthUI(user) {

/* ============================
IMAGE COMPRESSION (client-side)
============================ */

async function fileToCompressedDataURL(file, maxW = 1200, quality = 0.72) {
  const img = await new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = reject;
    i.src = URL.createObjectURL(file);
  });

  const scale = Math.min(1, maxW / img.width);
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);

  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, w, h);

  const dataUrl = canvas.toDataURL("image/jpeg", quality);
  try {
    URL.revokeObjectURL(img.src);
  } catch (_) {}
  return dataUrl;
}

/* ============================
MEMORY VAULT (Firestore + Storage)
============================ */

let unsubscribeFeed = null;

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll("\"", "&quot;")
    .replaceAll("'", "&#39;");
}

function startFeedListener() {
  if (unsubscribeFeed) unsubscribeFeed();

  const entriesRef = collection(db, "entries");
  const q = query(entriesRef, orderBy("createdAt", "desc"), limit(50));

  unsubscribeFeed = onSnapshot(
    q,
    (snap) => {
      const feed = document.getElementById("memoryFeed");
      feed.innerHTML = "";

      const docs = [];
      snap.forEach((d) => {
        docs.push({ id: d.id, ...d.data() });
      });

      // Helpers for grouping / formatting
      function startOfDay(dt) {
        const x = new Date(dt);
        x.setHours(0, 0, 0, 0);
        return x;
      }

      const now = new Date();
      const today0 = startOfDay(now);
      const yesterday0 = new Date(today0);
      yesterday0.setDate(yesterday0.getDate() - 1);

      function dayLabel(day0) {
        const t = day0.getTime();
        if (t === today0.getTime()) return "Today";
        if (t === yesterday0.getTime()) return "Yesterday";
        return day0.toLocaleDateString(undefined, {
          weekday: "short",
          month: "short",
          day: "numeric",
        });
      }

      function timeLabel(dt) {
        const d0 = startOfDay(dt);
        const isToday = d0.getTime() === today0.getTime();
        if (isToday) {
          return dt.toLocaleTimeString(undefined, {
            hour: "numeric",
            minute: "2-digit",
          });
        }
        return dt.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      // Group entries by local day
      const groups = new Map();
      for (const e of docs) {
        const dt = e.createdAt?.toDate
          ? e.createdAt.toDate()
          : (typeof e.createdAtClient === "number" ? new Date(e.createdAtClient) : null);
        const day0 = dt ? startOfDay(dt) : startOfDay(new Date(0));
        const key = day0.getTime();
        if (!groups.has(key)) groups.set(key, { day0, items: [] });
        groups.get(key).items.push({ ...e, __dt: dt });
      }

      // Sort day groups newest -> oldest
      const sortedGroups = Array.from(groups.values()).sort((a, b) => b.day0 - a.day0);

      for (const g of sortedGroups) {
        const h = document.createElement("div");
        h.className = "dayHeader";
        h.textContent = dayLabel(g.day0);
        feed.appendChild(h);

        // Items already in desc order due to query, but ensure within-day ordering
        g.items.sort((a, b) => {
          const ta = a.__dt ? a.__dt.getTime() : 0;
          const tb = b.__dt ? b.__dt.getTime() : 0;
          return tb - ta;
        });

        for (const entry of g.items) {
          const card = document.createElement("div");
          card.className = "entry";

          const who = (entry.who || "").trim();
          const whoClass = who.toLowerCase() === "alex" ? "alex" : (who.toLowerCase() === "nathalia" ? "nathalia" : "alex");

          const dt = entry.__dt;
          const ts = dt ? timeLabel(dt) : "";

          const promptText = (entry.promptText || "").trim();
          const promptCategory = (entry.promptCategory || "").trim();

          const hasPrompt = !!promptText;

          const headerRight = document.createElement("div");
          headerRight.className = "timestamp";
          headerRight.textContent = ts;

          card.innerHTML = `
            <div class="entryHeader">
              <div class="entryMeta">
                <span class="pill ${whoClass}">${who || ""}</span>
                ${hasPrompt ? `<span class="badge">${promptCategory || "Prompt"}</span>` : ``}
              </div>
              <div class="timestamp">${ts}</div>
            </div>

            ${hasPrompt ? `
              <div class="promptBlock">
                <div class="promptLabel">Prompt</div>
                <div>${escapeHtml(promptText)}</div>
              </div>
            ` : ``}

            ${entry.text ? `<div class="answerBlock">${escapeHtml(entry.text)}</div>` : ``}

            <div class="entryActions">
              ${entry.link ? `<a class="linkButton" href="${entry.link}" target="_blank" rel="noopener noreferrer">Open link</a>` : ``}
            </div>

            ${entry.imageUrl ? `<img class="entryImage" src="${entry.imageUrl}" alt="Memory photo">` : ``}
          `;

          feed.appendChild(card);
        }
      }
    },
    (err) => {
      console.error("Feed listener error:", err);
      alert("Feed error: " + (err?.message || "unknown error"));
    }
  );
}

async function saveMemory() {
  const user = auth.currentUser;
  if (!user || !ALLOWED_EMAILS.has(user.email || "")) {
    alert("Sign in first.");
    return;
  }

  const text = document.getElementById("memoryText").value.trim();
  const link = document.getElementById("memoryLink").value.trim();
  const who = document.getElementById("memoryWho").value;
  const imageInput = document.getElementById("memoryImage");

  if (!text && !link && imageInput.files.length === 0) {
    alert("Add text, a link, or a photo first.");
    return;
  }
  if (entryMode === "prompt" && !currentPromptText) {
    alert("Spin a prompt first, then answer it.");
    return;
  }

  // Optional client-side file size guardrail
  if (imageInput.files.length > 0) {
    const file = imageInput.files[0];
    if (file.size > 8 * 1024 * 1024) {
      alert("That photo is too large. Try a smaller one.");
      return;
    }
  }

  let imageUrl = "";

  if (imageInput.files.length > 0) {
    const file = imageInput.files[0];

    try {
      const dataUrl = await fileToCompressedDataURL(file, 1200, 0.72);
      const path = `entries/${user.uid}/${Date.now()}.jpg`;
      const imgRef = storageRef(storage, path);

      await uploadString(imgRef, dataUrl, "data_url");
      imageUrl = await getDownloadURL(imgRef);
    } catch (err) {
      console.error("Image upload error:", err);
      alert("Photo upload failed: " + (err?.message || "unknown error"));
      return;
    }
  }

  try {
    await addDoc(collection(db, "entries"), {
      who,
      text,
      link,
      entryType: entryMode === "prompt" ? "promptAnswer" : "memory",
      promptCategory: entryMode === "prompt" ? currentPromptCategory : "",
      promptText: entryMode === "prompt" ? currentPromptText : "",
      imageUrl,
      createdAt: serverTimestamp(),
      createdAtClient: Date.now(),
      uid: user.uid,
      email: user.email,
    });

    document.getElementById("memoryText").value = "";
    document.getElementById("memoryLink").value = "";
    document.getElementById("memoryImage").value = "";
    setCurrentPrompt("", "");
  } catch (err) {
    console.error("Save entry error:", err);
    alert("Save failed: " + (err?.message || "unknown error"));
  }
}

/* ============================
BOOT
============================ */

onAuthStateChanged(auth, (user) => {
  setAuthUI(user);

  const isAllowed = !!user && ALLOWED_EMAILS.has(user.email || "");

  if (isAllowed) {
    startFeedListener();
  } else {
    if (unsubscribeFeed) unsubscribeFeed();
    unsubscribeFeed = null;
    document.getElementById("memoryFeed").innerHTML = "";
  }
});

// Disable vault inputs until signed in
setAuthUI(null);
showTab("prompts");
setEntryMode("memory");
</script>
